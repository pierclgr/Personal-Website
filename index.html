<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="old/css/wip.css">
    <title>Pierpasquale Colagrande - Website Under Construction</title>
    <link rel="shortcut icon" type="image/png" href="old/icons/logo.png" />
</head>
<body>
    <div class="content">
        <h2 id="score">&nbsp;</h2>
        <canvas id="snakeCanvas" width="500" height="500"></canvas>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const canvas = document.getElementById("snakeCanvas");
                const ctx = canvas.getContext("2d");
                const playButton = document.getElementById("playButton");
    
                const gridSize = 20;
                let snake = [{ x: 10, y: 10 }];
                let direction = "right";
                let food = getRandomFoodPosition();
                let gameSpeed = 150;
                let isPlaying = false;
    
                function draw() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    const cols = canvas.width / gridSize;
                    const rows = canvas.height / gridSize;
                    const hPortalSize = Math.round(cols / 3);
                    const vPortalSize = Math.round(rows / 3);
                    const hPortalStart = Math.floor(cols / 2 - hPortalSize / 2);
                    const hPortalEnd = hPortalStart + hPortalSize;
                    const vPortalStart = Math.floor(rows / 2 - vPortalSize / 2);
                    const vPortalEnd = vPortalStart + vPortalSize;

                    // Draw borders
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = "#555";

                    function drawEdgeSegment(x1, y1, x2, y2, dashed) {
                        ctx.beginPath();
                        ctx.setLineDash(dashed ? [6, 8] : []);
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x2, y2);
                        ctx.stroke();
                    }

                    // Top edge
                    drawEdgeSegment(0, 0, hPortalStart * gridSize, 0, false);
                    drawEdgeSegment(hPortalStart * gridSize, 0, hPortalEnd * gridSize, 0, true);
                    drawEdgeSegment(hPortalEnd * gridSize, 0, canvas.width, 0, false);
                    // Bottom edge
                    drawEdgeSegment(0, canvas.height, hPortalStart * gridSize, canvas.height, false);
                    drawEdgeSegment(hPortalStart * gridSize, canvas.height, hPortalEnd * gridSize, canvas.height, true);
                    drawEdgeSegment(hPortalEnd * gridSize, canvas.height, canvas.width, canvas.height, false);
                    // Left edge
                    drawEdgeSegment(0, 0, 0, vPortalStart * gridSize, false);
                    drawEdgeSegment(0, vPortalStart * gridSize, 0, vPortalEnd * gridSize, true);
                    drawEdgeSegment(0, vPortalEnd * gridSize, 0, canvas.height, false);
                    // Right edge
                    drawEdgeSegment(canvas.width, 0, canvas.width, vPortalStart * gridSize, false);
                    drawEdgeSegment(canvas.width, vPortalStart * gridSize, canvas.width, vPortalEnd * gridSize, true);
                    drawEdgeSegment(canvas.width, vPortalEnd * gridSize, canvas.width, canvas.height, false);

                    ctx.setLineDash([]);

                    snake.forEach(segment => {
                        ctx.fillStyle = "#fefcfb";
                        ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize, gridSize);
                    });

                    ctx.fillStyle = "#fe7f2d";
                    ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize, gridSize);
                }
    
                function update() {
                    const head = { ...snake[0] };
                    switch (direction) {
                        case "up":
                            head.y -= 1;
                            break;
                        case "down":
                            head.y += 1;
                            break;
                        case "left":
                            head.x -= 1;
                            break;
                        case "right":
                            head.x += 1;
                            break;
                    }
    
                    // Wall logic: hard walls with portal openings at the center of each side
                    const cols = canvas.width / gridSize;
                    const rows = canvas.height / gridSize;
                    const hPortalSize = Math.round(cols / 3);
                    const vPortalSize = Math.round(rows / 3);
                    const hPortalStart = Math.floor(cols / 2 - hPortalSize / 2);
                    const hPortalEnd = hPortalStart + hPortalSize;
                    const vPortalStart = Math.floor(rows / 2 - vPortalSize / 2);
                    const vPortalEnd = vPortalStart + vPortalSize;

                    if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
                        const isPortal =
                            (head.x < 0 && head.y >= vPortalStart && head.y < vPortalEnd) ||
                            (head.x >= cols && head.y >= vPortalStart && head.y < vPortalEnd) ||
                            (head.y < 0 && head.x >= hPortalStart && head.x < hPortalEnd) ||
                            (head.y >= rows && head.x >= hPortalStart && head.x < hPortalEnd);
                        if (isPortal) {
                            head.x = (head.x + cols) % cols;
                            head.y = (head.y + rows) % rows;
                        } else {
                            resetGame();
                            return;
                        }
                    }
    
                    snake.unshift(head);
    
                    if (head.x === food.x && head.y === food.y) {
                        food = getRandomFoodPosition();
                        increaseSpeed();
                    } else {
                        snake.pop();
                    }
    
                    if (checkCollision()) {
                        resetGame();
                    }
                }
    
                function checkCollision() {
                    return snake.slice(1).some(segment => segment.x === snake[0].x && segment.y === snake[0].y);
                }
    
                function getRandomFoodPosition() {
                    return {
                        x: Math.floor(Math.random() * (canvas.width / gridSize)),
                        y: Math.floor(Math.random() * (canvas.height / gridSize))
                    };
                }
    
                function resetGame() {
                    document.getElementById("score").textContent = "Game over! Your score: " + (snake.length - 1);
                    snake = [{ x: 10, y: 10 }];
                    direction = "right";
                    food = getRandomFoodPosition();
                    isPlaying = false;
                    playButton.disabled = false;
                    gameSpeed = 150;
                }
    
                function increaseSpeed() {
                    gameSpeed -= 2.5;
                }
    
                function handleKeydown(event) {
                    if (!isPlaying) {
                        document.getElementById("score").textContent = "\xa0";
                        isPlaying = true;
                        playButton.disabled = true;
                        gameLoop();
                    }
    
                    const opposites = { up: "down", down: "up", left: "right", right: "left" };
                    const keyMap = { ArrowUp: "up", ArrowDown: "down", ArrowLeft: "left", ArrowRight: "right" };
                    const newDir = keyMap[event.key];
                    if (newDir && (snake.length <= 2 || newDir !== opposites[direction])) {
                        direction = newDir;
                    }
                }
    
                function handlePlayButtonClick() {
                    if (!isPlaying) {
                        document.getElementById("score").textContent = "\xa0";
                        isPlaying = true;
                        playButton.disabled = true;
                        gameLoop();
                    }
                }
    
                document.addEventListener("keydown", handleKeydown);
                playButton.addEventListener("click", handlePlayButtonClick);
    
                function gameLoop() {
                    update();
                    draw();

                    if (isPlaying) {
                        setTimeout(() => {
                            requestAnimationFrame(gameLoop);
                        }, gameSpeed);
                    }
                }

                draw();
            });
        </script>
    </div>

    <button id="playButton">Play</button>
